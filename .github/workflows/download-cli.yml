name: Install Rust

on:
  workflow_dispatch:

jobs:
  install-rust:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version
      
      - name: Save Rust installation
        run: |
          mkdir -p rust-installation/.cargo
          mkdir -p rust-installation/.rustup
          cp -r $HOME/.cargo/* rust-installation/.cargo/
          cp -r $HOME/.rustup/* rust-installation/.rustup/
          ls -la rust-installation/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-installation
          path: rust-installation/
