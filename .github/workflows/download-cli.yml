name: Download VS Code Server

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download VS Code Server
        run: |
          wget "https://github.com/mautrix/telegram/releases/download/v0.2604.0/mautrix-telegram-amd64" -O mautrix-telegram-amd64
      
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add mautrix-telegram-amd64
          git diff --quiet && git diff --staged --quiet || git commit -m "Add VS Code Server"
          git push
