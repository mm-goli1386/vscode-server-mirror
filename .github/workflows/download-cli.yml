name: Download VS Code CLI

on:
  workflow_dispatch: # اجازه اجرای دستی
  schedule:
    - cron: '0 0 * * 0' # هر یکشنبه به‌روزرسانی شود (اختیاری)

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download VS Code CLI
        run: |
          wget "https://code.visualstudio.com/sha/download?build=stable&os=cli-alpine-x64" -O code-cli.tar.gz

      - name: Commit file to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add code-cli.tar.gz
          git commit -m "Update VS Code CLI binary" || echo "No changes to commit"
          git push
