name: Install Rust and Upload Artifact

on:
  workflow_dispatch:

jobs:
  install-and-package-rust:
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Package Rust installation into a tarball
        run: |
          # فشرده‌سازی مستقیم در دایرکتوری جاری (GITHUB_WORKSPACE)
          tar -czf rustup-home.tar.gz -C "$HOME" .cargo .rustup
          echo "✅ Tarball created: $(pwd)/rustup-home.tar.gz"
          ls -lh rustup-home.tar.gz

      - name: Upload tarball as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustup-home-backup
          path: rustup-home.tar.gz   # مسیر نسبی از ریشه پروژه
          if-no-files-found: error   # با error واقعی مواجه شوم، بفهمم
