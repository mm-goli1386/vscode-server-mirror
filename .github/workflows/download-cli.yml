name: Install Rust

on:
  workflow_dispatch:

jobs:
  install-rust:
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          
      - name: Package
        run: |
          cd ~
          tar -czf /tmp/rustup-home.tar.gz .cargo .rustup
          mv /tmp/rustup-home.tar.gz .
          ls -la
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rustup-home-backup
          path: ./rustup-home.tar.gz
