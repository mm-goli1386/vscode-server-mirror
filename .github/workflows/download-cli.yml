name: Download VS Code Server

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download VS Code Server
        run: |
          wget "https://update.code.visualstudio.com/commit:072586267e68ece9a47aa43f8c108e0dcbf44622/server-linux-x64/stable" -O vscode-server-linux-x64.tar.gz
      
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add vscode-server-linux-x64.tar.gz
          git diff --quiet && git diff --staged --quiet || git commit -m "Add VS Code Server"
          git push
