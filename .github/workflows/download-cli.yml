name: Download VS Code CLI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

# اضافه کردن مجوز نوشتن
permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download VS Code CLI
        run: |
          wget "https://code.visualstudio.com/sha/download?build=stable&os=cli-alpine-x64" -O code-cli.tar.gz
      
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add code-cli.tar.gz
          # فقط اگر فایل تغییر کرده باشد commit می‌کند
          git diff --quiet && git diff --staged --quiet || git commit -m "Update VS Code CLI binary"
          git push
